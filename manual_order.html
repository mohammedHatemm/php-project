<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Manual Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #adb5bd;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: #87CEEB;
            padding: 1rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .container {
            margin-top: 50px;
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #6c757d;
            font-weight: bold;
        }

        .form-select, .form-control {
            border-radius: 10px;
        }

        .btn-primary {
            background-color: #6c757d;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: #5a6268;
        }

        .card {
            margin-top: 20px;
            display: none;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar">
    <div>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Users</a>
        <a href="#"><a href="manual_order.html">Manual Order</a>
        <a href="#">Checks</a>
    </div>
    <div class="admin-icon">
        <i class="bi bi-person-circle" style="font-size: 1.5rem; margin-right: 5px;"></i>
        <span>Admin</span>
        <div class="logout" style="display: flex; align-items: center; margin-left: 15px; cursor: pointer;">
            <i class="bi bi-box-arrow-right" style="font-size: 1.5rem; margin-right: 5px;"></i>
            <span>Log out</span>
        </div>
    </div>
</nav>

<div class="container">
    <h2>Create Manual Order</h2>
    <form id="orderForm">
        <!-- اختيار المستخدم -->
        <div class="mb-4">
            <label for="user" class="form-label">Select User:</label>
            <select id="user" class="form-select">
                <option value="Rawda Ramadan">Rawda Ramadan</option>
                <option value="Menna Mohamed">Menna Mohamed</option>
                <option value="Ahmed Ali">Ahmed Ali</option>
            </select>
        </div>

        <!-- اختيار العناصر -->
        <div class="mb-4">
            <label class="form-label">Select Items:</label>
            <div class="form-check">
                <input class="form-check-input item" type="checkbox" id="item1" value="5" data-name="Tea">
                <label class="form-check-label" for="item1">Tea (5 LE)</label>
            </div>
            <div class="form-check">
                <input class="form-check-input item" type="checkbox" id="item2" value="6" data-name="Coffee">
                <label class="form-check-label" for="item2">Coffee (6 LE)</label>
            </div>
            <div class="form-check">
                <input class="form-check-input item" type="checkbox" id="item3" value="10" data-name="Cola">
                <label class="form-check-label" for="item3">Cola (10 LE)</label>
            </div>
            <div class="form-check">
                <input class="form-check-input item" type="checkbox" id="item4" value="8" data-name="Nescafe">
                <label class="form-check-label" for="item4">Nescafe (8 LE)</label>
            </div>
        </div>

        <!-- إدخال الكمية -->
        <div class="mb-4">
            <label for="quantity" class="form-label">Enter Quantity:</label>
            <input type="number" id="quantity" class="form-control" min="1" value="1">
        </div>

        <!-- إدخال رقم الغرفة -->
        <div class="mb-4">
            <label for="room" class="form-label">Room Number:</label>
            <input type="text" id="room" class="form-control">
        </div>

        <!-- تحديد تاريخ الطلب -->
        <div class="mb-4">
            <label for="date" class="form-label">Select Date:</label>
            <input type="datetime-local" id="date" class="form-control">
        </div>

        <!-- عرض السعر الإجمالي -->
        <div class="mb-4">
            <label class="form-label">Total Price:</label>
            <input type="text" id="totalPrice" class="form-control" disabled>
        </div>

        <!-- زر الإرسال -->
        <div class="d-grid">
            <button type="button" class="btn btn-primary" onclick="showSummary()">Submit Order</button>
        </div>
    </form>

    <!-- ملخص الطلب -->
    <div class="card" id="orderSummary">
        <div class="card-body">
            <h5 class="card-title">Order Summary</h5>
            <p class="card-text"><strong>User:</strong> <span id="summaryUser"></span></p>
            <p class="card-text"><strong>Items:</strong> <span id="summaryItems"></span></p>
            <p class="card-text"><strong>Room:</strong> <span id="summaryRoom"></span></p>
            <p class="card-text"><strong>Date:</strong> <span id="summaryDate"></span></p>
            <p class="card-text"><strong>Total Price:</strong> <span id="summaryTotal"></span> LE</p>
            <button class="btn btn-success">Mark as Delivered</button>
        </div>
    </div>
</div>

<script>
    // حساب السعر الإجمالي
    document.querySelectorAll('.item').forEach(item => {
        item.addEventListener('change', updateTotal);
    });
    document.getElementById('quantity').addEventListener('input', updateTotal);

    function updateTotal() {
        const quantity = parseInt(document.getElementById('quantity').value) || 1;
        let total = 0;
        document.querySelectorAll('.item:checked').forEach(item => {
            total += parseInt(item.value) * quantity;
        });
        document.getElementById('totalPrice').value = total + ' LE';
    }

    // عرض ملخص الطلب
    function showSummary() {
        const user = document.getElementById('user').value;
        const room = document.getElementById('room').value;
        const date = document.getElementById('date').value;
        const total = document.getElementById('totalPrice').value;

        let items = [];
        document.querySelectorAll('.item:checked').forEach(item => {
            items.push(item.getAttribute('data-name'));
        });

        if (user && room && items.length > 0 && date) {
            document.getElementById('summaryUser').innerText = user;
            document.getElementById('summaryRoom').innerText = room;
            document.getElementById('summaryItems').innerText = items.join(', ');
            document.getElementById('summaryDate').innerText = date;
            document.getElementById('summaryTotal').innerText = total;

            document.getElementById('orderSummary').style.display = 'block';
        } else {
            alert('Please fill all fields and select items!');
        }
    }
</script>

</body>
</html>
